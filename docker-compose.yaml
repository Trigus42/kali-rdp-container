services:
  rdp-kali:
    build: ./kali-rdp-image/
    container_name: rdp-kali
    environment:
      - SSHD_ENABLE=true
      - MSF_ENABLE=false
    ports:
      - "127.0.0.1:3389:3389"
      - "127.0.0.1:2222:22"
    volumes:
      - ./:/workspace/host-volume/:rw
      - /var/run/docker.sock:/var/run/docker.sock
    sysctls:
      net.ipv6.conf.all.disable_ipv6: 0
    # Networking (VPN, Proxy, etc.)
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun
    # Many things (like NFS mounting) require privileged mode
    privileged: true
