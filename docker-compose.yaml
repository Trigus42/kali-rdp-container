services:
  rdp-kali:
    build: ./kali-rdp-image/
    container_name: rdp-kali
    environment:
      - SSHD_ENABLE=true
      - DIND_ENABLE=true
      - MSF_ENABLE=false
      - GOCRYPTFS_PASSWORD=${GOCRYPTFS_PASSWORD}
      # - RAW_MOUNT=/workspace/host-unencrypted
      # - ENCRYPTED_MOUNT=/workspace/host-encrypted
      # - ENCRYPTED_FOLDER_NAME=kali-encrypted-mount
    ports:
      - "127.0.0.1:3389:3389"
      - "127.0.0.1:2222:22"
    volumes:
      - ../:/workspace/host-unencrypted/:rw
    sysctls:
      net.ipv6.conf.all.disable_ipv6: 0
    # Networking (VPN, Proxy, etc.)
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun
    # Many things (like NFS mounting) require privileged mode
    privileged: true
