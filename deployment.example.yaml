apiVersion: v1
kind: Namespace
metadata:
  name: kali
  labels:
    pod-security.kubernetes.io/enforce: privileged
    pod-security.kubernetes.io/warn: privileged
---
apiVersion: v1
kind: Secret
metadata:
  name: kali-ssh-key
type: Opaque
stringData:
  authorized_keys: |
    ssh-ed25519 AAAA... your-public-key-here
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rdp-kali
  labels:
    app: rdp-kali
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rdp-kali
  template:
    metadata:
      labels:
        app: rdp-kali
    spec:
      # Pod-level security context for sysctls
      securityContext:
        sysctls:
        - name: net.ipv6.conf.all.disable_ipv6
          value: "0"
      containers:
      - name: rdp-kali
        image: ghcr.io/trigus42/kali-rdp-container:latest
        imagePullPolicy: Always
        env:
        - name: SSHD_ENABLE
          value: "true"
        - name: MSF_ENABLE
          value: "true"
        - name: DIND_ENABLE
          value: "true"
        - name: HISTFILE
          value: "/workspace/host-volume/.persist/.zsh_history"
        - name: SYNCTHING_ENABLE
          value: "true"
        - name: STHOMEDIR
          value: "/workspace/host-volume/.persist/.syncthing"
        - name: SYNCTHING_SYNC_DIR
          value: "/workspace/host-volume/syncthing"
        ports:
        - containerPort: 3389
          name: rdp
        - containerPort: 22
          name: ssh
        # Container-level security context for privileges and capabilities
        securityContext:
          privileged: true
          capabilities:
            add:
            - NET_ADMIN
        volumeMounts:
        - name: host-workspace
          mountPath: /workspace/host-volume/
        - name: ssh-key
          mountPath: /etc/ssh/authorized_keys
          readOnly: true
        resources:
          requests:
            memory: "2Gi"
            cpu: "1"
          limits:
            memory: "8Gi"
            cpu: "3"

      volumes:
      - name: host-workspace
        hostPath:
          path: /var/data/kali-workspace
          type: DirectoryOrCreate
      - name: ssh-key
        secret:
          secretName: kali-ssh-key
          defaultMode: 0600
---
apiVersion: v1
kind: Service
metadata:
  name: rdp-kali-ssh
  namespace: kali
spec:
  type: NodePort
  selector:
    app: rdp-kali
  ports:
  - port: 22
    targetPort: 22
    nodePort: 30022
    protocol: TCP
